  <!-- DATABRICKS SECTION -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="482" width="840" height="120" rx="12" fill="#fff5f0" stroke="#f0c8b0" stroke-width="1.5" filter="url(#shadow)"/>
